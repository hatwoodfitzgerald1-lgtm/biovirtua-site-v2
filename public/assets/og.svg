<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630"><defs><radialGradient id="g" cx="70%" cy="35%" r="70%"><stop offset="0%" stop-color="#123" /><stop offset="100%" stop-color="#070B1A"/></radialGradient></defs><rect width="1200" height="630" fill="url(#g)"/><g fill="#22C7D6">${Array.from({length:120}).map(()=>{const x=(600+Math.random()*520)|0,y=(120+Math.random()*400)|0;return `<circle cx="${x}" cy="${y}" r="${(1+Math.random()*2)|0}" opacity="${(0.3+Math.random()*0.6).toFixed(2)}"/>`;}).join('')}</g><text x="80" y="300" font-family="Space Grotesk,Arial,sans-serif" font-size="72" font-weight="700" fill="#F7FAFC">BioVirtua</text><text x="80" y="370" font-family="IBM Plex Mono,monospace" font-size="30" fill="#22C7D6">See how you move, in about two minutes</text><text x="80" y="430" font-family="Inter Tight,Arial,sans-serif" font-size="26" fill="#9fb0c9">Markerless movement measurement. No wearables.</text></svg>
